<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>0xJunkyBox — ReelJest &amp; ClipRecipe Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
  <style>
    :root {
      --bg-deep: #0c0e14;
      --bg-card: #141922;
      --border-subtle: #252d3d;
      --border-accent: #4a7c59;
      --text-primary: #e8edf5;
      --text-muted: #7d8fa8;
      --accent: #5b9a6e;
      --accent-hover: #6eb87f;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 20px rgba(0,0,0,0.25);
      --transition: 0.2s ease;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }
    .wrap {
      max-width: 1024px;
      margin: 0 auto;
      padding: 24px 20px;
    }
    .header {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .header p {
      margin-top: 6px;
      font-size: 0.95rem;
      color: var(--text-muted);
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      transition: border-color var(--transition);
    }
    .card:hover {
      border-color: rgba(74, 124, 89, 0.4);
    }
    .card h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-primary);
    }
    .card label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .in {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-deep);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      transition: border-color var(--transition);
    }
    .in:focus {
      outline: none;
      border-color: var(--accent);
    }
    .in::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }
    .btn {
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      padding: 9px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      transition: background var(--transition), color var(--transition);
    }
    .btn:hover {
      background: var(--accent);
      color: var(--bg-deep);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .tab {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 10px 14px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color var(--transition), border-color var(--transition);
    }
    .tab:hover {
      color: var(--text-primary);
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .panel {
      display: none;
    }
    .panel.active {
      display: block;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    th, td {
      font-family: 'JetBrains Mono', monospace;
      border-bottom: 1px solid var(--border-subtle);
      padding: 10px 8px;
      text-align: left;
    }
    th {
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    tr:hover td {
      background: rgba(74, 124, 89, 0.06);
    }
    .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    #status {
      margin-top: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) {
      .grid2 { grid-template-columns: 1fr; }
    }
    .phase-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .phase-0 { background: #2a2d35; color: #9ca3af; }
    .phase-1 { background: #1e3a2f; color: #86efac; }
    .phase-2 { background: #1e2a3a; color: #7dd3fc; }
    .phase-3 { background: #1e293b; color: #a5b4fc; }
    .phase-4 { background: #3f1d1d; color: #fca5a5; }
    .status-0 { background: #2a2d35; color: #9ca3af; }
    .status-1 { background: #1e3a2f; color: #86efac; }
    .status-2 { background: #1e2a3a; color: #7dd3fc; }
    .status-3 { background: #422006; color: #fcd34d; }
    .status-4 { background: #3f1d1d; color: #fca5a5; }
    .section-title {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .input-group {
      margin-bottom: 14px;
    }
    .input-group .in {
      margin-top: 4px;
    }
    .foot-note {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .stat-box {
      background: var(--bg-deep);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 12px;
      text-align: center;
    }
    .stat-box .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
    }
    .stat-box .label {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
      text-transform: uppercase;
    }
    .detail-panel {
      margin-top: 16px;
      padding: 16px;
      background: var(--bg-deep);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
    }
    .detail-panel h3 {
      font-size: 0.95rem;
      margin-bottom: 10px;
      color: var(--text-muted);
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.85rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row .key { color: var(--text-muted); }
    .detail-row .val { font-family: 'JetBrains Mono', monospace; }
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .tooltip-wrap {
      position: relative;
    }
    .tooltip-wrap:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 100%;
      left: 0;
      padding: 6px 10px;
      background: var(--bg-deep);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      white-space: nowrap;
      z-index: 10;
      margin-bottom: 4px;
    }
    .divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 16px 0;
    }
    .text-ellipsis {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-ok { background: rgba(74, 124, 89, 0.3); color: var(--accent); }
    .badge-warn { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    .badge-err { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
    @media (max-width: 768px) {
      .wrap { padding: 16px 12px; }
      .card { padding: 14px; }
      table { font-size: 0.75rem; }
      th, td { padding: 6px 4px; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
